# Nginx 反向代理配置 — HTTPS + 域名 rimurutempest.me
#
# 安装步骤（在服务器上执行）：
#   1. 先装好 Node.js 服务
#   2. 安装 Nginx: apt install nginx
#   3. 申请 SSL: apt install certbot python3-certbot-nginx
#      certbot --nginx -d rimurutempest.me
#   4. 复制配置: cp deploy/nginx.conf /etc/nginx/sites-available/auto-eval
#   5. 启用配置: ln -s /etc/nginx/sites-available/auto-eval /etc/nginx/sites-enabled/
#   6. 重载: nginx -t && systemctl reload nginx

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name rimurutempest.me;
    return 301 https://$server_name$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name rimurutempest.me;

    # SSL 证书（certbot 自动生成）
    ssl_certificate /etc/letsencrypt/live/rimurutempest.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rimurutempest.me/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 禁用 SSL 缓冲以支持 SSE
    ssl_buffer_size 4k;

    # 代理到 Node.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 支持（关键配置）
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # 限制请求体大小
    client_max_body_size 10k;
}
